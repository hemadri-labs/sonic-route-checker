# exabgp.conf — ExaBGP route injection configuration
#
# ExaBGP peers with sonic1 (172.20.20.2) over the eth1 link (192.168.10.0/30).
# It advertises a set of test prefixes that the route consistency checker
# will monitor.
#
# Route injection / withdrawal is driven by infra/routes.py (process API).
#
# Test prefixes advertised:
#   10.100.0.0/24  — primary test prefix (used by fault injection scenarios)
#   10.101.0.0/24  — secondary test prefix
#   10.102.0.0/24  — tertiary test prefix
#   10.200.0.0/22  — aggregated block (tests prefix aggregation)
#
# BGP topology:
#   ExaBGP AS 65100 → sonic1 AS 65001
#   Peering IPs: exabgp1=192.168.10.1, sonic1=192.168.10.2
#
# Usage (inside exabgp1 container):
#   exabgp /etc/exabgp/exabgp.conf
#
# To withdraw a route for fault injection:
#   echo "withdraw route 10.100.0.0/24 next-hop 192.168.10.1" \
#     | socat - UNIX-CONNECT:/var/run/exabgp.sock
# Or use tests/fault_inject.py which wraps these commands.

process route-injector {
    # routes.py sends BGP UPDATE messages to ExaBGP via stdout
    run python3 /etc/exabgp/routes.py;
    encoder text;
}

neighbor 192.168.10.2 {
    # sonic1 data-plane IP on eth1
    router-id 192.168.10.1;
    local-address 192.168.10.1;
    local-as 65100;
    peer-as 65001;

    # Announce IPv4 unicast
    family {
        ipv4 unicast;
    }

    # Use the process API for dynamic route injection
    api {
        processes [ route-injector ];
    }
}
